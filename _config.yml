# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

# custom_layout은 _layouts 폴더에 있는 파일 이름
title: Tech Blog
lang: ko
email: ilikeksy99@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  C#, Unity, .NET, OpenCV와 컴퓨터 과학 학습 기록, 프로젝트 회고, 개발 문제 해결 과정을 정리하는 개인 기술 블로그입니다.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://sunbang123.github.io" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  sunbang123

author-profile:
  name: "김선영"
  bio: "한세대학교 22학번 컴퓨터공학과"
  email: "ilikeksy99@gmail.com"
  linkedin: "sunyoung-kim-86a54b283"
  youtube: "UCfFOEhFPrz3EoLfflhr1NGA"

# 구글 검색어
google_site_verification: e51F6SpZbz_x6ubkOKLTeqEzuMBZ6XgKJYAzEOe7fEI

# Build settings
# theme: minima
asset_url: /assets
plugins:
  - jekyll-feed
  # - jekyll-polyglot
  - jekyll-seo-tag
  - jekyll-sitemap

# languages: ['ko', 'ja', 'en']
# default_lang: 'ko'
# exclude_from_localization: ["assets/css", "assets/img"]
parallel_localization: false

sass:
  quiet_deps: true
  sourcemap: never
  sass_dir: _sass
  load_paths:
    - _sass
    - _sass/bootstrap/vendor
  style: compressed # 컴파일된 CSS 파일을 압축하려면 이 옵션을 사용

# 태그 관련 새로운 설정
tag_page_layout: tags
tag_page_dir: tag
tag_permalink_style: pretty

# 태그 페이지 제목 (다국어 지원을 위해 각 언어별로 설정)
tag_page_title: 
  ko: "태그별 포스트"
  ja: "タグ別の投稿"
  en: "Posts by Tag"

# 태그 구분자 설정
tag_separator: ", "

# 포스트당 최대 표시 태그 수 (0은 제한 없음)
max_tags_per_post: 5

# 태그 클라우드 설정
tag_cloud:
  min_font_size: 10
  max_font_size: 20

# 태그 메타데이터 표시 여부
show_tag_metadata: true

# URL 구조 설정
permalink: /:title/

# 기존 Jekyll 설정에 추가
collections:
  projects:
    output: true
    permalink: /project/:name/
  devlogs:
    output: true
    permalink: /devlog/:name/

defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/thumbnail/default-og.jpg
  - scope:
      path: "_projects"
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: "_devlogs"
      type: "devlogs"
    values:
      layout: "devlog_post"

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

tag_categories:
  컴퓨터 과학:
    - Computer Network
    - computer-architecture
    - computer-science
    - Algorithm
    - Digital Image Processing
    - MATLAB
    - Artificial Intelligence
    - AI
    - Network  

  소프트웨어:
    - Software
    - Software-Engineering
    - Software-Development
    - Software-Testing
    - Software-Design
    - Software-Architecture
    - DevLog
    - Debugging
    - web-development

  프로그래밍:
    - c
    - Csharp
    - Cpp
    - Python
    - Java
    - Programming
    - Embedded

  Configuration:
    - Git
    - git-pages
    - jekyll
    - SDK
    - Node-red
    - Open-Graph
  
  자격증:
    - Certification
  
  게임 개발:
    - Unity
    - Unreal
    - Game Development
    - Game Theory

# Jekyll이 빌드할 때 포함할 파일/폴더
include:
  - _data
  - manifest.json
  - sw.js
  - icon-192.png
  - icon-512.png
  - robots.txt
