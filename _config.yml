# Jekyll이 빌드할 때 포함할 파일/폴더
include:
  - _data
  - manifest.json
  - sw.js
  - icon-192.png
  - icon-512.png
  - robots.txt

# 로컬 작성 도구와 로그는 GitHub 저장소에서만 관리하고 공개 사이트에는 복사하지 않습니다.
