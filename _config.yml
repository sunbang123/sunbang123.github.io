google_site_verification: e51F6SpZbz_x6ubkOKLTeqEzuMBZ6XgKJYAzEOe7fEI

# Build settings
# theme: minima
asset_url: /assets
plugins:
  - jekyll-feed
  # - jekyll-polyglot
  - jekyll-seo-tag
  - jekyll-sitemap

# languages: ['ko', 'ja', 'en']
# default_lang: 'ko'
# exclude_from_localization: ["assets/css", "assets/img"]
parallel_localization: false

sass:
  quiet_deps: true
  sourcemap: never
  sass_dir: _sass
  load_paths:
    - _sass
    - _sass/bootstrap/vendor
  style: compressed # 컴파일된 CSS 파일을 압축하려면 이 옵션을 사용

# 태그 관련 새로운 설정
tag_page_layout: tags
tag_page_dir: tag
tag_permalink_style: pretty

# 태그 페이지 제목 (다국어 지원을 위해 각 언어별로 설정)
tag_page_title: 
  ko: "태그별 포스트"
  ja: "タグ別の投稿"
  en: "Posts by Tag"

# 태그 구분자 설정
tag_separator: ", "

# 포스트당 최대 표시 태그 수 (0은 제한 없음)
max_tags_per_post: 5

# 태그 클라우드 설정
tag_cloud:
  min_font_size: 10
  max_font_size: 20

# 태그 메타데이터 표시 여부
show_tag_metadata: true

# URL 구조 설정
permalink: /:title/

# 기존 Jekyll 설정에 추가
collections:
  projects:
    output: true
    permalink: /project/:name/
  devlogs:
    output: true
    permalink: /devlog/:name/

defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/thumbnail/default-og.jpg
  - scope:
      path: "_posts"
      type: "posts"
    values:
      author: "김선영"
  - scope:
      path: "report-main"
    values:
      sitemap: false
  - scope:
      path: "momonton"
    values:
      sitemap: false
  - scope:
      path: "naverec6b76c63fe7a72720cfad89fdb480f6.html"
    values:
      sitemap: false
  - scope:
      path: "_projects"
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: "_devlogs"
      type: "devlogs"
    values:
      layout: "devlog_post"
      sitemap: false
      robots: "noindex, follow"

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
