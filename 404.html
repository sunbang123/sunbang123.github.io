---
permalink: /404.html
layout: default
title: 404
sitemap: false
robots: "noindex, nofollow"
---

<section class="error-game-page" data-error-game-root>
  <canvas
    class="error-game-canvas"
    data-error-game-canvas
    width="1440"
    height="720"
    aria-label="Interactive 404 runner game. Press Space/Arrow Up to jump (double jump available) or Arrow Down to duck. On touch devices, use the Jump and Duck buttons."
    role="img"></canvas>

  <div class="error-game-touch-controls" aria-hidden="true">
    <button type="button" class="error-game-touch-btn error-game-touch-btn--duck" data-error-game-touch-duck>
      <span class="error-game-touch-btn__icon">&#9660;</span>
      <small>Duck</small>
    </button>
    <button type="button" class="error-game-touch-btn error-game-touch-btn--jump" data-error-game-touch-jump>
      <span class="error-game-touch-btn__icon">&#9650;</span>
      <small>Jump</small>
    </button>
  </div>

  <div class="error-game-hud" aria-label="Game status">
    <span>Score <strong data-error-game-score>0</strong></span>
    <span>Best <strong data-error-game-best>0</strong></span>
    <span>Signals <strong data-error-game-signals>0</strong><small>Best <b data-error-game-best-signals>0</b></small></span>
    <span data-error-game-combo-badge>Combo <strong data-error-game-combo>x1</strong></span>
    <span data-error-game-shield-badge>Shield <strong data-error-game-shield>0</strong></span>
  </div>

  <div class="error-game-panel" data-error-game-overlay aria-live="polite">
    <h1 data-error-game-title>404</h1>
    <p><strong data-error-game-state>Page not found :(</strong></p>
    <p data-error-game-message>The requested page could not be found.</p>
    <div class="error-game-actions">
      <button class="error-game-button error-game-button--primary" type="button" data-error-game-start hidden>Retry</button>
      <a class="error-game-button error-game-button--secondary" href="{{ '/' | relative_url }}">Home</a>
    </div>
  </div>
</section>

<script type="module" src="{{ '/assets/javascripts/custom/error-game/main.js' | relative_url }}"></script>
